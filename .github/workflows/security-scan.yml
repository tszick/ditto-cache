name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1"
  workflow_dispatch:
    inputs:
      dast_target_url:
        description: "Optional authorized Ditto HTTP/mgmt URL for Nuclei DAST"
        required: false
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --no-banner --redact \
            --report-format sarif --report-path /repo/gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  trivy-fs:
    name: Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:latest \
            fs /repo \
            --scanners vuln,misconfig \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs /repo/target \
            --format sarif \
            --output /repo/trivy-fs.sarif \
            --exit-code 1

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  cargo-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  nuclei-dast:
    name: DAST (Nuclei)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.dast_target_url != ''
    steps:
      - name: Run Nuclei against authorized target
        run: |
          docker run --rm -v "$PWD:/work" projectdiscovery/nuclei:latest \
            -target "${{ inputs.dast_target_url }}" \
            -severity medium,high,critical \
            -tags cve,exposure,misconfig,xss,sqli,ssrf,redirect \
            -no-interactsh \
            -exclude-tags fuzz,intrusive \
            -rate-limit 50 \
            -timeout 10 \
            -json-export /work/nuclei.json \
            -sarif-export /work/nuclei.sarif

      - name: Upload Nuclei SARIF
        if: always() && hashFiles('nuclei.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: nuclei.sarif
          category: nuclei-dast

      - name: Upload Nuclei JSON
        if: always() && hashFiles('nuclei.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: nuclei-json
          path: nuclei.json

  zap-baseline:
    name: DAST (OWASP ZAP Baseline)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.dast_target_url != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.dast_target_url }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          allow_issue_writing: false
          fail_action: true
          artifact_name: zap-baseline-cache
          cmd_options: "-a -m 3"

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy-fs, cargo-audit]
    if: always() && !cancelled()
    steps:
      - name: Verify required security scans passed
        run: |
          test "${{ needs.gitleaks.result }}" = "success"
          test "${{ needs.trivy-fs.result }}" = "success"
          test "${{ needs.cargo-audit.result }}" = "success"

      - name: Summarize security scan
        run: |
          {
            echo "## Security Scan Summary"
            echo ""
            echo "- gitleaks: ${{ needs.gitleaks.result }}"
            echo "- trivy-fs: ${{ needs.trivy-fs.result }}"
            echo "- cargo-audit: ${{ needs.cargo-audit.result }}"
            echo ""
            echo "Container image scanning is intentionally out of scope for this repository."
          } >> "$GITHUB_STEP_SUMMARY"
