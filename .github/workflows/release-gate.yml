name: Release Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-gate:
    name: Rust Build and Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check

      - name: Cargo test (workspace)
        run: cargo test --workspace

      - name: Flaky guard (repeat critical suites)
        run: |
          for i in 1 2 3; do
            echo "Flaky guard pass $i/3"
            cargo test -p dittod -- --test-threads=1
            cargo test -p dittoctl -- --test-threads=1
          done

      - name: Protocol compatibility check
        run: cargo test -p ditto-protocol

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security scan (cargo audit)
        run: cargo audit
