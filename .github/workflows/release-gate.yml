name: Release Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  repo-hygiene:
    name: Repo Hygiene Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate repo hygiene
        run: python scripts/validate-repo-hygiene.py

  runbook-dry:
    name: Runbook Validation (Dry Run Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate runbook scenarios in dry-run mode
        shell: pwsh
        run: ./scripts/preprod-runbook-validate.ps1 -DryRun

  runbook-real:
    name: Runbook Validation (Real Run Gate)
    runs-on: [self-hosted, windows]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate runbook scenarios against live dev cluster
        shell: powershell
        run: >
          .\scripts\preprod-runbook-validate.ps1
          -ComposeDir "..\ditto-docker"
          -Namespace "preprod-release-gate"

  protocol-contract:
    name: Protocol Contract Drift Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate protocol contract
        shell: pwsh
        run: ./scripts/generate-protocol-contract.ps1

      - name: Verify contract is committed
        shell: bash
        run: git diff --exit-code -- ditto-protocol/schema/protocol-contract.json

      - name: Contract check mode
        shell: pwsh
        run: ./scripts/generate-protocol-contract.ps1 -Check

  perf-gate:
    name: Perf Baseline Regression Gate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run performance gate
        shell: pwsh
        run: ./scripts/perf-gate.ps1 -Samples 80 -Warmup 10

  dast-evidence:
    name: DAST Evidence Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Validate DAST release evidence
        run: python scripts/validate-dast-evidence.py

  backup-restore-policy:
    name: Backup Restore Policy Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Validate backup and restore production policy
        run: python scripts/validate-backup-restore-policy.py

  coverage-threshold:
    name: Coverage Threshold Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run and validate Rust coverage threshold
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --summary-only | tee coverage-threshold.txt
          line_pct=$(grep -E '^TOTAL' coverage-threshold.txt | awk '{gsub("%","",$NF); print $NF}' | tail -n1)
          python scripts/validate-coverage-thresholds.py --metric "rust-workspace-line:${line_pct}"

  rust-gate:
    name: Rust Build and Test Gate
    needs: [repo-hygiene, runbook-dry, protocol-contract, perf-gate, dast-evidence, backup-restore-policy, coverage-threshold]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check

      - name: Cargo test (workspace)
        run: cargo test --workspace

      - name: Flaky guard (repeat critical suites)
        run: |
          for i in 1 2 3; do
            echo "Flaky guard pass $i/3"
            cargo test -p dittod -- --test-threads=1
            cargo test -p dittoctl -- --test-threads=1
          done

      - name: Protocol compatibility check
        run: cargo test -p ditto-protocol

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security scan (cargo audit)
        run: cargo audit

  release-readiness:
    name: Release Readiness Summary
    needs: [repo-hygiene, runbook-dry, protocol-contract, perf-gate, dast-evidence, backup-restore-policy, coverage-threshold, rust-gate]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required gates passed
        shell: bash
        run: |
          set -euo pipefail
          test "${{ needs.repo-hygiene.result }}" = "success"
          test "${{ needs.runbook-dry.result }}" = "success"
          test "${{ needs.protocol-contract.result }}" = "success"
          test "${{ needs.perf-gate.result }}" = "success"
          test "${{ needs.dast-evidence.result }}" = "success"
          test "${{ needs.backup-restore-policy.result }}" = "success"
          test "${{ needs.coverage-threshold.result }}" = "success"
          test "${{ needs.rust-gate.result }}" = "success"
      - name: Summarize release readiness
        shell: bash
        run: |
          {
            echo "## Release Readiness Summary"
            echo ""
            echo "- repo-hygiene: ${{ needs.repo-hygiene.result }}"
            echo "- runbook-dry: ${{ needs.runbook-dry.result }}"
            echo "- protocol-contract: ${{ needs.protocol-contract.result }}"
            echo "- perf-gate: ${{ needs.perf-gate.result }}"
            echo "- dast-evidence: ${{ needs.dast-evidence.result }}"
            echo "- backup-restore-policy: ${{ needs.backup-restore-policy.result }}"
            echo "- coverage-threshold: ${{ needs.coverage-threshold.result }}"
            echo "- rust-gate: ${{ needs.rust-gate.result }}"
            echo ""
            echo "Main branch still requires the separate self-hosted runbook-real gate."
          } >> "$GITHUB_STEP_SUMMARY"
