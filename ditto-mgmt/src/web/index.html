<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ditto Cluster Management</title>
  <link rel="icon" href="data:,">
  <link href="assets/bootstrap.min.css" rel="stylesheet">
  <link href="assets/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d1117; }
    .panel-bg { background: #161b22; }
    .navbar-brand { font-weight: 700; letter-spacing: .05em; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
    .status-active   { background: #2ea043; box-shadow: 0 0 6px #2ea04388; }
    .status-inactive { background: #d29922; box-shadow: 0 0 6px #d2992288; }
    .status-offline  { background: #8b949e; }
    .status-unreachable { color: #f85149; font-size: 1.1em; margin-right: 4px; }
    .badge-primary { background: linear-gradient(135deg, #1f6feb, #388bfd); }
    .memory-bar { height: 6px; border-radius: 3px; background: #30363d; overflow: hidden; margin-top: 3px; }
    .memory-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; background: linear-gradient(90deg, #2ea043, #1f6feb); }
    .memory-bar-fill.warn  { background: linear-gradient(90deg, #d29922, #e3b341); }
    .memory-bar-fill.crit  { background: linear-gradient(90deg, #f85149, #ff7b72); }
    .memory-progress { width: 100%; height: 6px; border: 0; border-radius: 3px; background: #30363d; overflow: hidden; display: block; margin-top: 3px; }
    .memory-progress::-webkit-progress-bar { background: #30363d; border-radius: 3px; }
    .memory-progress::-webkit-progress-value { background: linear-gradient(90deg, #2ea043, #1f6feb); border-radius: 3px; }
    .memory-progress::-moz-progress-bar { background: linear-gradient(90deg, #2ea043, #1f6feb); border-radius: 3px; }
    .memory-progress.warn::-webkit-progress-value { background: linear-gradient(90deg, #d29922, #e3b341); }
    .memory-progress.warn::-moz-progress-bar { background: linear-gradient(90deg, #d29922, #e3b341); }
    .memory-progress.crit::-webkit-progress-value { background: linear-gradient(90deg, #f85149, #ff7b72); }
    .memory-progress.crit::-moz-progress-bar { background: linear-gradient(90deg, #f85149, #ff7b72); }
    .node-row { cursor: pointer; transition: background .15s; }
    .node-row:hover { background: rgba(255,255,255,.04) !important; }
    .node-row.selected { background: rgba(31,111,235,.12) !important; border-left: 3px solid #388bfd; }
    .details-panel { border-top: 1px solid #30363d; background: #161b22; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .detail-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
    .detail-label { font-size: .75rem; color: #8b949e; text-transform: uppercase; letter-spacing: .08em; }
    .detail-value { font-size: .95rem; font-weight: 600; color: #e6edf3; margin-top: 2px; word-break: break-all; }
    .refresh-badge { font-size: .75rem; cursor: pointer; user-select: none; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
    .table > :not(caption) > * > * { padding: .6rem .75rem; }
    .table-heading { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; }
    .heartbeat-good { color: #2ea043; }
    .heartbeat-warn { color: #d29922; }
    .heartbeat-bad  { color: #f85149; }
    .uptime-col { font-variant-numeric: tabular-nums; }
    .action-btn { font-size: .78rem; padding: 2px 10px; }
    .badge-success-custom { background: #2ea043; }
    .badge-warning-custom { background: #d29922; }
    .badge-primary-gradient { background: linear-gradient(135deg, #1f6feb, #388bfd); }
    .addr-subtitle { font-size: .75rem; }
    .memory-col { min-width: 140px; }
    .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .overview-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px; min-height: 116px; }
    .overview-card.ok { border-color: rgba(46,160,67,.55); }
    .overview-card.warn { border-color: rgba(210,153,34,.7); }
    .overview-card.crit { border-color: rgba(248,81,73,.75); }
    .overview-label { font-size: .72rem; color: #8b949e; text-transform: uppercase; letter-spacing: .08em; }
    .overview-value { font-size: 1.35rem; font-weight: 700; line-height: 1.15; margin-top: 6px; }
    .overview-note { color: #8b949e; font-size: .82rem; margin-top: 8px; }
    .finding-list { margin: 8px 0 0; padding-left: 18px; color: #c9d1d9; font-size: .82rem; }
    .finding-list li { margin: 2px 0; }
    .ops-panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    .ops-tabs { border-bottom: 1px solid #30363d; }
    .ops-tabs .nav-link { color: #8b949e; border: 0; border-radius: 0; }
    .ops-tabs .nav-link.active { color: #e6edf3; background: #0d1117; border-bottom: 2px solid #388bfd; }
    .ops-body { padding: 14px; }
    .ops-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
    .ops-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
    .ops-card-title { color: #8b949e; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .compact-table { font-size: .84rem; }
    .compact-table td, .compact-table th { padding: .45rem .5rem; }
    .form-control, .form-select { background-color: #0d1117; color: #e6edf3; border-color: #30363d; }
    .form-control:focus, .form-select:focus { background-color: #0d1117; color: #e6edf3; border-color: #388bfd; box-shadow: 0 0 0 .2rem rgba(56,139,253,.15); }
    .result-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; min-height: 84px; max-height: 280px; overflow: auto; padding: 10px; font-size: .82rem; white-space: pre-wrap; }
    .confirmation-summary { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-size: .86rem; }
    .confirmation-summary dt { color: #8b949e; font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 2px; }
    .confirmation-summary dd { color: #e6edf3; margin-bottom: 8px; word-break: break-all; }
    :root {
      --ditto-bg: #f7fbff;
      --ditto-surface: rgba(255, 255, 255, 0.8);
      --ditto-surface-strong: #ffffff;
      --ditto-text: #18202b;
      --ditto-muted: #5c6977;
      --ditto-line: rgba(24, 32, 43, 0.09);
      --ditto-blue: #22b7f2;
      --ditto-blue-deep: #1694dc;
      --ditto-green: #8bd63d;
      --ditto-green-deep: #63b92f;
      --ditto-orange: #ffbb43;
      --ditto-navy: #1d2430;
      --ditto-shadow: 0 24px 80px rgba(24, 58, 92, 0.14);
      --font-display: "Space Grotesk", "Segoe UI", sans-serif;
      --font-body: "Manrope", "Segoe UI", sans-serif;
    }
    html { color-scheme: light; }
    body {
      font-family: var(--font-body);
      color: var(--ditto-text);
      background:
        radial-gradient(circle at top left, rgba(34, 183, 242, 0.25), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(139, 214, 61, 0.2), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 187, 67, 0.16), transparent 24%),
        linear-gradient(180deg, #f8fcff 0%, #eef6fb 100%);
    }
    .panel-bg,
    .card,
    .details-panel,
    .ops-panel,
    .overview-card,
    .ops-card,
    .detail-card,
    .modal-content,
    .confirmation-summary,
    .result-box {
      background: var(--ditto-surface);
      border-color: rgba(255, 255, 255, 0.72) !important;
      box-shadow: var(--ditto-shadow);
      backdrop-filter: blur(16px);
      color: var(--ditto-text);
    }
    .navbar {
      background: rgba(248, 252, 255, 0.86) !important;
      border-color: rgba(24, 32, 43, 0.05) !important;
      backdrop-filter: blur(18px);
    }
    .navbar-brand {
      color: var(--ditto-text) !important;
      font-family: var(--font-display);
      letter-spacing: 0;
      display: inline-flex;
      align-items: center;
      gap: .8rem;
    }
    .brand-logo {
      width: 2.35rem;
      height: 2.35rem;
      object-fit: contain;
      filter: drop-shadow(0 10px 24px rgba(24, 58, 92, 0.14));
    }
    .text-secondary,
    .text-muted,
    .overview-note,
    .detail-label,
    .ops-card-title,
    .overview-label,
    .table-heading,
    .addr-subtitle {
      color: var(--ditto-muted) !important;
    }
    .detail-value,
    .overview-value,
    .fw-semibold,
    .modal-title,
    .confirmation-summary dd {
      color: var(--ditto-text);
    }
    .overview-label,
    .detail-label,
    .ops-card-title,
    h1, h2, h3 {
      font-family: var(--font-display);
      letter-spacing: 0;
    }
    .ops-card,
    .overview-card,
    .detail-card,
    .card,
    .modal-content,
    .result-box,
    .confirmation-summary {
      border-radius: 16px;
    }
    .overview-card,
    .ops-card,
    .detail-card {
      background: rgba(255, 255, 255, 0.72);
    }
    .overview-card.ok,
    .ops-card.ok {
      border-top: 4px solid var(--ditto-green) !important;
    }
    .overview-card.warn,
    .ops-card.warn {
      border-top: 4px solid var(--ditto-orange) !important;
    }
    .overview-card.crit,
    .ops-card.crit {
      border-top: 4px solid #f85149 !important;
    }
    .badge-primary,
    .badge-primary-gradient {
      background: linear-gradient(135deg, var(--ditto-blue), var(--ditto-green)) !important;
      color: #fff;
    }
    .badge-success-custom,
    .bg-success {
      background-color: var(--ditto-green-deep) !important;
    }
    .badge-warning-custom,
    .bg-warning {
      background-color: var(--ditto-orange) !important;
    }
    .bg-secondary {
      background-color: rgba(24, 32, 43, 0.62) !important;
    }
    .btn-outline-secondary,
    .btn-outline-primary,
    .btn-outline-success,
    .btn-outline-warning,
    .btn-outline-info,
    .btn-outline-danger {
      background: rgba(255, 255, 255, 0.58);
      border-color: rgba(24, 32, 43, 0.12);
      color: var(--ditto-text);
    }
    .btn-outline-primary:hover,
    .btn-primary,
    .btn-danger {
      background: linear-gradient(135deg, var(--ditto-blue), var(--ditto-green)) !important;
      border-color: transparent !important;
      color: #fff !important;
    }
    .ops-tabs {
      border-color: rgba(24, 32, 43, 0.08);
    }
    .ops-tabs .nav-link {
      color: var(--ditto-muted);
      font-weight: 700;
    }
    .ops-tabs .nav-link.active {
      color: var(--ditto-text);
      background: rgba(255, 255, 255, 0.72);
      border-bottom-color: var(--ditto-blue);
    }
    .table {
      --bs-table-bg: transparent;
      --bs-table-color: var(--ditto-text);
      --bs-table-hover-bg: rgba(34, 183, 242, 0.08);
      color: var(--ditto-text);
    }
    .table > :not(caption) > * > * {
      color: var(--ditto-text);
      border-color: rgba(24, 32, 43, 0.06);
    }
    .node-row:hover,
    .node-row.selected {
      background: rgba(34, 183, 242, 0.08) !important;
    }
    .form-control,
    .form-select {
      background-color: rgba(255, 255, 255, 0.78);
      color: var(--ditto-text);
      border-color: rgba(24, 32, 43, 0.12);
    }
    .form-control:focus,
    .form-select:focus {
      background-color: #fff;
      color: var(--ditto-text);
      border-color: rgba(34, 183, 242, 0.55);
      box-shadow: 0 0 0 .2rem rgba(34, 183, 242, .15);
    }
    .findings-card {
      max-height: 24rem;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .findings-scroll {
      overflow: auto;
      min-height: 0;
      padding-right: .25rem;
    }
    .compact-table {
      color: var(--ditto-text);
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary panel-bg">
  <div class="container-fluid px-4">
    <span class="navbar-brand">
      <img class="brand-logo" src="ditto-logo.png" alt="Ditto logo">Ditto Cluster Management
    </span>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-secondary small" id="last-updated">-</span>
      <span class="badge bg-secondary refresh-badge" id="auto-refresh-badge">
        <i class="bi bi-arrow-repeat me-1"></i>Auto-refresh ON
      </span>
      <button class="btn btn-sm btn-outline-secondary" id="refresh-now" title="Refresh now">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-3">

  <!-- Cluster summary pills -->
  <div class="d-flex gap-2 mb-3 flex-wrap" id="cluster-summary"></div>

  <!-- Production overview -->
  <div class="overview-grid mb-3" id="production-overview"></div>

  <!-- Production tools -->
  <section class="ops-panel mb-3">
    <ul class="nav nav-tabs ops-tabs" id="ops-tabs" role="tablist">
      <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#doctor-tab" type="button"><i class="bi bi-shield-check me-1"></i>Doctor</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#namespace-tab" type="button"><i class="bi bi-diagram-3 me-1"></i>Namespaces</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#cache-tab" type="button"><i class="bi bi-search me-1"></i>Cache</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#backup-tab" type="button"><i class="bi bi-archive me-1"></i>Backup</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#observability-tab" type="button"><i class="bi bi-activity me-1"></i>Observability</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#topology-tab" type="button"><i class="bi bi-hdd-network me-1"></i>Topology</button></li>
    </ul>
    <div class="tab-content ops-body">
      <div class="tab-pane fade show active" id="doctor-tab">
        <div id="doctor-panel" class="ops-grid"></div>
      </div>
      <div class="tab-pane fade" id="namespace-tab">
        <div id="namespace-panel"></div>
      </div>
      <div class="tab-pane fade" id="cache-tab">
        <div class="ops-grid">
          <div class="ops-card">
            <div class="ops-card-title">Target and key</div>
            <div class="row g-2">
              <div class="col-md-6"><select class="form-select form-select-sm" id="cache-target"></select></div>
              <div class="col-md-6"><input class="form-control form-control-sm" id="cache-namespace" placeholder="namespace"></div>
              <div class="col-md-6"><input class="form-control form-control-sm" id="cache-pattern" placeholder="pattern, e.g. user:*"></div>
              <div class="col-md-6"><input class="form-control form-control-sm" id="cache-key" placeholder="key"></div>
              <div class="col-12"><textarea class="form-control form-control-sm" id="cache-value" rows="3" placeholder="value"></textarea></div>
              <div class="col-md-6"><input class="form-control form-control-sm" id="cache-ttl" type="number" min="0" placeholder="ttl seconds"></div>
              <div class="col-md-6"><select class="form-select form-select-sm" id="cache-compressed"><option value="true">compressed=true</option><option value="false">compressed=false</option></select></div>
              <div class="col-12">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="cache-reveal">
                  <label class="form-check-label small text-secondary" for="cache-reveal">Request full value reveal</label>
                </div>
              </div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-3">
              <button class="btn btn-sm btn-outline-primary" data-cache-action="list"><i class="bi bi-list-ul me-1"></i>List</button>
              <button class="btn btn-sm btn-outline-secondary" data-cache-action="get"><i class="bi bi-box-arrow-in-down me-1"></i>Get</button>
              <button class="btn btn-sm btn-outline-success" data-cache-action="set"><i class="bi bi-upload me-1"></i>Set</button>
              <button class="btn btn-sm btn-outline-warning" data-cache-action="ttl"><i class="bi bi-clock-history me-1"></i>TTL</button>
              <button class="btn btn-sm btn-outline-info" data-cache-action="compressed"><i class="bi bi-file-zip me-1"></i>Compression</button>
              <button class="btn btn-sm btn-outline-danger" data-cache-action="delete"><i class="bi bi-trash me-1"></i>Delete</button>
              <button class="btn btn-sm btn-danger" data-cache-action="flush"><i class="bi bi-exclamation-octagon me-1"></i>Flush</button>
            </div>
          </div>
          <div class="ops-card">
            <div class="ops-card-title">Result</div>
            <div class="result-box font-monospace" id="cache-result">No cache operation yet.</div>
          </div>
        </div>
      </div>
      <div class="tab-pane fade" id="backup-tab">
        <div id="backup-panel"></div>
      </div>
      <div class="tab-pane fade" id="observability-tab">
        <div id="observability-panel"></div>
      </div>
      <div class="tab-pane fade" id="topology-tab">
        <div id="topology-panel"></div>
      </div>
    </div>
  </section>

  <!-- Node table -->
  <div class="card border-secondary">
    <div class="table-responsive">
      <table class="table table-borderless table-hover mb-0 align-middle" id="nodes-table">
        <thead class="border-bottom border-secondary panel-bg">
          <tr class="text-secondary table-heading">
            <th>Status</th>
            <th>Name</th>
            <th>Primary</th>
            <th>Keys</th>
            <th>Log index</th>
            <th class="memory-col">Memory</th>
            <th>Heartbeat</th>
            <th class="uptime-col">Uptime</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="nodes-tbody">
          <tr><td colspan="9" class="text-center text-secondary py-5">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Details panel -->
  <div class="card border-secondary mt-3 details-panel d-none" id="details-panel">
    <div class="card-header d-flex justify-content-between align-items-center border-secondary panel-bg">
      <span><i class="bi bi-info-circle me-2 text-primary"></i>Node Details: <strong id="details-title">-</strong></span>
      <button class="btn-close btn-close-white btn-sm" id="close-details"></button>
    </div>
    <div class="card-body">
      <div class="detail-grid" id="details-grid"></div>
    </div>
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Confirmation modal -->
<div class="modal fade" id="confirmation-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-danger">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="confirmation-title">Confirm operation</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-warning mb-3" id="confirmation-message"></p>
        <dl class="confirmation-summary" id="confirmation-summary"></dl>
        <label class="form-label small text-secondary mt-3" for="confirmation-input" id="confirmation-label"></label>
        <input class="form-control" id="confirmation-input" autocomplete="off">
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmation-approve" disabled>Confirm</button>
      </div>
    </div>
  </div>
</div>

<script src="assets/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
