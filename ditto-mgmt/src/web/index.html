<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ditto Cluster Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d1117; }
    .navbar-brand { font-weight: 700; letter-spacing: .05em; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
    .status-active   { background: #2ea043; box-shadow: 0 0 6px #2ea04388; }
    .status-inactive { background: #d29922; box-shadow: 0 0 6px #d2992288; }
    .status-offline  { background: #8b949e; }
    .status-unreachable { color: #f85149; font-size: 1.1em; margin-right: 4px; }
    .badge-primary { background: linear-gradient(135deg, #1f6feb, #388bfd); }
    .memory-bar { height: 6px; border-radius: 3px; background: #30363d; overflow: hidden; margin-top: 3px; }
    .memory-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; background: linear-gradient(90deg, #2ea043, #1f6feb); }
    .memory-bar-fill.warn  { background: linear-gradient(90deg, #d29922, #e3b341); }
    .memory-bar-fill.crit  { background: linear-gradient(90deg, #f85149, #ff7b72); }
    .node-row { cursor: pointer; transition: background .15s; }
    .node-row:hover { background: rgba(255,255,255,.04) !important; }
    .node-row.selected { background: rgba(31,111,235,.12) !important; border-left: 3px solid #388bfd; }
    .details-panel { border-top: 1px solid #30363d; background: #161b22; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .detail-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
    .detail-label { font-size: .75rem; color: #8b949e; text-transform: uppercase; letter-spacing: .08em; }
    .detail-value { font-size: .95rem; font-weight: 600; color: #e6edf3; margin-top: 2px; word-break: break-all; }
    .refresh-badge { font-size: .75rem; cursor: pointer; user-select: none; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
    .table > :not(caption) > * > * { padding: .6rem .75rem; }
    .heartbeat-good { color: #2ea043; }
    .heartbeat-warn { color: #d29922; }
    .heartbeat-bad  { color: #f85149; }
    .uptime-col { font-variant-numeric: tabular-nums; }
    .action-btn { font-size: .78rem; padding: 2px 10px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary" style="background:#161b22">
  <div class="container-fluid px-4">
    <span class="navbar-brand">
      <i class="bi bi-database-gear me-2 text-primary"></i>Ditto Cluster Management
    </span>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-secondary small" id="last-updated">â€”</span>
      <span class="badge bg-secondary refresh-badge" id="auto-refresh-badge" onclick="toggleAutoRefresh()">
        <i class="bi bi-arrow-repeat me-1"></i>Auto-refresh ON
      </span>
      <button class="btn btn-sm btn-outline-secondary" onclick="fetchNodes()" title="Refresh now">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-3">

  <!-- Cluster summary pills -->
  <div class="d-flex gap-2 mb-3 flex-wrap" id="cluster-summary"></div>

  <!-- Node table -->
  <div class="card border-secondary">
    <div class="table-responsive">
      <table class="table table-borderless table-hover mb-0 align-middle" id="nodes-table">
        <thead class="border-bottom border-secondary" style="background:#161b22">
          <tr class="text-secondary" style="font-size:.78rem;text-transform:uppercase;letter-spacing:.08em">
            <th>Status</th>
            <th>Name</th>
            <th>Primary</th>
            <th>Committed</th>
            <th style="min-width:140px">Memory</th>
            <th>Heartbeat</th>
            <th class="uptime-col">Uptime</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="nodes-tbody">
          <tr><td colspan="8" class="text-center text-secondary py-5">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loadingâ€¦
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Details panel -->
  <div class="card border-secondary mt-3 details-panel d-none" id="details-panel">
    <div class="card-header d-flex justify-content-between align-items-center border-secondary" style="background:#161b22">
      <span><i class="bi bi-info-circle me-2 text-primary"></i>Node Details: <strong id="details-title">â€”</strong></span>
      <button class="btn-close btn-close-white btn-sm" onclick="closeDetails()"></button>
    </div>
    <div class="card-body">
      <div class="detail-grid" id="details-grid"></div>
    </div>
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let autoRefresh = true;
let refreshTimer = null;
let selectedAddr = null;
let nodesData = [];

// ---------------------------------------------------------------------------
// Auto-refresh
// ---------------------------------------------------------------------------
function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  const badge = document.getElementById('auto-refresh-badge');
  if (autoRefresh) {
    badge.className = 'badge bg-secondary refresh-badge';
    badge.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Auto-refresh ON';
    scheduleRefresh();
  } else {
    badge.className = 'badge bg-danger refresh-badge';
    badge.innerHTML = '<i class="bi bi-pause-fill me-1"></i>Auto-refresh OFF';
    clearTimeout(refreshTimer);
  }
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  if (autoRefresh) refreshTimer = setTimeout(fetchNodes, 3000);
}

// ---------------------------------------------------------------------------
// Fetch nodes
// ---------------------------------------------------------------------------
async function fetchNodes() {
  try {
    const resp = await fetch('/api/nodes');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    nodesData = data.nodes || [];
    renderTable(nodesData);
    renderSummary(nodesData);
    document.getElementById('last-updated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();
    if (selectedAddr) refreshDetails(selectedAddr);
  } catch(e) {
    showToast('danger', 'Fetch error: ' + e.message);
  }
  scheduleRefresh();
}

// ---------------------------------------------------------------------------
// Render cluster summary pills
// ---------------------------------------------------------------------------
function renderSummary(nodes) {
  const total    = nodes.length;
  const active   = nodes.filter(n => n.reachable && n.status === 'Active').length;
  const inactive = nodes.filter(n => n.reachable && n.status === 'Inactive').length;
  const unreach  = nodes.filter(n => !n.reachable).length;
  const primary  = nodes.find(n => n.is_primary);

  const el = document.getElementById('cluster-summary');
  el.innerHTML = `
    <span class="badge bg-secondary"><i class="bi bi-server me-1"></i>${total} nodes</span>
    <span class="badge" style="background:#2ea043"><i class="bi bi-check-circle me-1"></i>${active} active</span>
    ${inactive ? `<span class="badge" style="background:#d29922"><i class="bi bi-pause-circle me-1"></i>${inactive} inactive</span>` : ''}
    ${unreach  ? `<span class="badge bg-danger"><i class="bi bi-exclamation-triangle me-1"></i>${unreach} unreachable</span>` : ''}
    ${primary  ? `<span class="badge" style="background:linear-gradient(135deg,#1f6feb,#388bfd)"><i class="bi bi-star-fill me-1"></i>Primary: ${escapeHtml(primary.node_name || primary.addr)}</span>` : ''}
  `;
}

// ---------------------------------------------------------------------------
// Render table
// ---------------------------------------------------------------------------
function renderTable(nodes) {
  const tbody = document.getElementById('nodes-tbody');
  if (!nodes.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-secondary py-4">No nodes discovered.</td></tr>';
    return;
  }

  tbody.innerHTML = nodes.map(n => {
    const isSelected = n.addr === selectedAddr;

    // Status indicator
    let statusHtml;
    if (!n.reachable) {
      statusHtml = `<span class="status-unreachable"><i class="bi bi-exclamation-triangle-fill"></i></span><span class="text-danger small">Unreachable</span>`;
    } else if (n.status === 'Active') {
      statusHtml = `<span class="status-dot status-active"></span><span class="text-success small">Active</span>`;
    } else if (n.status === 'Inactive') {
      statusHtml = `<span class="status-dot status-inactive"></span><span class="text-warning small">Inactive</span>`;
    } else {
      statusHtml = `<span class="status-dot status-offline"></span><span class="text-secondary small">${escapeHtml(n.status || '?')}</span>`;
    }

    // Primary badge
    const primaryHtml = n.is_primary
      ? '<span class="badge badge-primary"><i class="bi bi-star-fill me-1"></i>PRIMARY</span>'
      : '<span class="text-muted">â€”</span>';

    // Memory bar
    let memHtml = '<span class="text-muted">â€”</span>';
    if (n.memory_used_bytes != null && n.memory_max_bytes != null && n.memory_max_bytes > 0) {
      const pct = Math.round(n.memory_used_bytes * 100 / n.memory_max_bytes);
      const cls = pct >= 90 ? 'crit' : pct >= 70 ? 'warn' : '';
      memHtml = `
        <span class="small">${fmtBytes(n.memory_used_bytes)} / ${fmtBytes(n.memory_max_bytes)}</span>
        <div class="memory-bar"><div class="memory-bar-fill ${cls}" style="width:${pct}%"></div></div>`;
    }

    // Heartbeat
    let hbHtml = '<span class="text-muted">â€”</span>';
    if (n.heartbeat_ms != null) {
      const cls = n.heartbeat_ms < 10 ? 'heartbeat-good' : n.heartbeat_ms < 50 ? 'heartbeat-warn' : 'heartbeat-bad';
      hbHtml = `<span class="${cls} small fw-semibold">${n.heartbeat_ms}ms</span>`;
    }

    // Uptime
    const uptimeHtml = n.uptime_secs != null
      ? `<span class="uptime-col small">${fmtUptime(n.uptime_secs)}</span>`
      : '<span class="text-muted">â€”</span>';


    // Actions
    let actionsHtml = '';
    if (n.reachable) {
      const isActive = n.status === 'Active';
      const btnVariant = isActive ? 'outline-warning' : 'outline-success';
      const btnLabel   = isActive ? 'Deactivate' : 'Activate';
      actionsHtml = `
        <button class="btn ${btnVariant} action-btn me-1"
          onclick="event.stopPropagation(); setActive('${escapeForSingleQuote(n.node_name)}', ${!isActive})">
          ${btnLabel}
        </button>
        <button class="btn btn-outline-secondary action-btn"
          onclick="event.stopPropagation(); triggerBackup('${escapeForSingleQuote(n.node_name)}')">
          <i class="bi bi-archive me-1"></i>Backup
        </button>`;
    } else {
      actionsHtml = '<span class="text-muted small">(unavailable)</span>';
    }

    return `
      <tr class="node-row ${isSelected ? 'selected' : ''}" onclick="selectNode('${escapeForSingleQuote(n.addr)}')">
        <td><div class="d-flex align-items-center">${statusHtml}</div></td>
        <td>
          <div class="fw-semibold">${escapeHtml(n.node_name || '-')}</div>
          <div class="text-muted" style="font-size:.75rem">${escapeHtml(n.addr)}</div>
        </td>
        <td>${primaryHtml}</td>
        <td><span class="font-monospace small">${n.committed_index ?? 'â€”'}</span></td>
        <td>${memHtml}</td>
        <td>${hbHtml}</td>
        <td>${uptimeHtml}</td>
        <td>${actionsHtml}</td>
      </tr>`;
  }).join('');
}

// ---------------------------------------------------------------------------
// Details panel
// ---------------------------------------------------------------------------
function selectNode(addr) {
  if (selectedAddr === addr) {
    closeDetails();
    return;
  }
  selectedAddr = addr;
  document.querySelectorAll('.node-row').forEach(r => r.classList.remove('selected'));
  event.currentTarget && event.currentTarget.classList.add('selected');
  refreshDetails(addr);
}

function refreshDetails(addr) {
  const node = nodesData.find(n => n.addr === addr);
  if (!node) return;

  document.getElementById('details-title').textContent = node.node_name || addr;
  document.getElementById('details-panel').classList.remove('d-none');

  const fields = [
    ['Node ID',        node.node_id],
    ['Address',        node.addr],
    ['Status',         node.status],
    ['Primary',        node.is_primary != null ? (node.is_primary ? 'Yes â˜…' : 'No') : null],
    ['Committed Index',node.committed_index],
    ['Memory Used',    node.memory_used_bytes != null ? fmtBytes(node.memory_used_bytes) : null],
    ['Memory Max',     node.memory_max_bytes  != null ? fmtBytes(node.memory_max_bytes)  : null],
    ['Heartbeat',      node.heartbeat_ms != null ? node.heartbeat_ms + 'ms' : null],
    ['Uptime',         node.uptime_secs  != null ? fmtUptime(node.uptime_secs) : null],
    ['Backup Storage', node.backup_dir_bytes != null ? fmtBytes(node.backup_dir_bytes) : null],
    ['Keys',           node.key_count],
    ['Evictions',      node.evictions],
    ['Hits',           node.hit_count],
    ['Misses',         node.miss_count],
  ];

  document.getElementById('details-grid').innerHTML = fields
    .filter(([, v]) => v != null)
    .map(([label, value]) => `
      <div class="detail-card">
        <div class="detail-label">${escapeHtml(label)}</div>
        <div class="detail-value">${escapeHtml(value)}</div>
      </div>`)
    .join('');
}

function closeDetails() {
  selectedAddr = null;
  document.getElementById('details-panel').classList.add('d-none');
  document.querySelectorAll('.node-row').forEach(r => r.classList.remove('selected'));
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------
async function setActive(addr, active) {
  try {
    const resp = await fetch(`/api/nodes/${addr}/set-active`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active }),
    });
    const data = await resp.json();
    const ok = Array.isArray(data) ? data.every(r => r.ok) : data.ok;
    showToast(ok ? 'success' : 'warning',
      `${addr}: ${active ? 'Activated' : 'Deactivated'}${ok ? '' : ' (check server logs)'}`);
    await fetchNodes();
  } catch(e) {
    showToast('danger', 'Error: ' + e.message);
  }
}

async function triggerBackup(addr) {
  try {
    const resp = await fetch(`/api/nodes/${addr}/backup`, { method: 'POST' });
    const data = await resp.json();
    const result = Array.isArray(data) ? data[0] : data;
    if (result && result.ok) {
      showToast('success', `Backup written: ${result.path}`);
    } else {
      showToast('warning', `Backup: ${result?.error || 'unknown error'}`);
    }
  } catch(e) {
    showToast('danger', 'Error: ' + e.message);
  }
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeForSingleQuote(value) {
  return String(value ?? '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r/g, '\\r')
    .replace(/\n/g, '\\n')
    .replace(/</g, '\\x3C');
}

function fmtBytes(b) {
  if (b == null) return 'â€”';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}

function fmtUptime(secs) {
  if (secs == null) return 'â€”';
  if (secs < 60)   return secs + 's';
  if (secs < 3600) return Math.floor(secs/60) + 'm ' + (secs%60) + 's';
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs % 60;
  return `${h}h ${m}m ${s}s`;
}

function showToast(type, message) {
  const id = 'toast-' + Date.now();
  const icons = { success: 'check-circle-fill', danger: 'x-circle-fill', warning: 'exclamation-triangle-fill', info: 'info-circle-fill' };
  const icon = icons[type] || 'info-circle-fill';
  const el = document.createElement('div');
  el.id = id;
  el.className = `toast align-items-center text-bg-${type} border-0`;
  el.setAttribute('role', 'alert');
  el.innerHTML = `
    <div class="d-flex">
      <div class="toast-body"><i class="bi bi-${icon} me-2"></i>${escapeHtml(message)}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>`;
  document.getElementById('toast-container').appendChild(el);
  const toast = new bootstrap.Toast(el, { delay: 4000 });
  toast.show();
  el.addEventListener('hidden.bs.toast', () => el.remove());
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
fetchNodes();
</script>
</body>
</html>
